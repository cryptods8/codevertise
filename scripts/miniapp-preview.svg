<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" font-family="'DejaVu Sans Mono', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1018"/>
      <stop offset="1" stop-color="#080a10"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="798" fill="none" stroke="#1b2230" stroke-width="2"/>

  <!-- brand mark: three bars (filled / hollow / filled) + wordmark -->
  <g transform="translate(96,104)">
    <rect x="0"  y="0" width="22" height="64" rx="4" fill="#4cc2ff"/>
    <rect x="32" y="3" width="18" height="58" rx="3" fill="none" stroke="#4cc2ff" stroke-width="6"/>
    <rect x="64" y="0" width="22" height="64" rx="4" fill="#4cc2ff"/>
    <text x="118" y="50" font-size="46" font-weight="700" fill="#e8eef6">codevertise</text>
  </g>

  <!-- corner tag -->
  <text x="1104" y="150" font-size="26" text-anchor="end" fill="#4cc2ff" font-weight="700">x402 · USDC · Base</text>

  <!-- headline -->
  <text x="96" y="322" font-size="68" font-weight="700" fill="#e8eef6">Rent the AI coding</text>
  <text x="96" y="400" font-size="68" font-weight="700" fill="#4cc2ff">agent's status line</text>

  <!-- subhead -->
  <text x="96" y="470" font-size="32" fill="#9fb0c3">Sponsored lines on AI-agent surfaces,</text>
  <text x="96" y="512" font-size="32" fill="#9fb0c3">settled in USDC over HTTP 402.</text>

  <!-- mock terminal status line -->
  <g transform="translate(96,584)">
    <rect x="0" y="0" width="1008" height="120" rx="14" fill="#11161f" stroke="#222c3a" stroke-width="2"/>
    <circle cx="34" cy="34" r="7" fill="#ff5f56"/>
    <circle cx="60" cy="34" r="7" fill="#ffbd2e"/>
    <circle cx="86" cy="34" r="7" fill="#27c93f"/>
    <text x="32"  y="90" font-size="26" font-weight="700" fill="#4cc2ff">ad</text>
    <text x="78"  y="90" font-size="26" fill="#5f7088">·</text>
    <text x="110" y="90" font-size="26" fill="#cdd8e6">Deploy faster with Acme CI</text>
    <text x="540" y="90" font-size="26" fill="#5f7088">&#8594; acme.dev</text>
  </g>
</svg>
